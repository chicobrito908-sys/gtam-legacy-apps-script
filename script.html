<script>
// ═══════════════════════════════════════════════════════
// ESCALANTE PRO — script.html
// ═══════════════════════════════════════════════════════

// ── Estado global ────────────────────────────────────
const S = {
  efetivo: [], escalas: [], plantoes: [],
  afastamentos: [], ferias: [], faltas: [], bancoHoras: [],
  calMes: new Date().getMonth() + 1,
  calAno: new Date().getFullYear(),
  pCalMes: new Date().getMonth() + 1,
  pCalAno: new Date().getFullYear(),
  selDay: null,
  pSelDay: null,
  currentPage: 'dashboard'
};

// ── Helpers ──────────────────────────────────────────
const $  = id => document.getElementById(id);
const br = s => s ? `<br>${s}` : '';
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function api(action, data, cb) {
  showSpin(true);
  google.script.run
    .withSuccessHandler(r => { showSpin(false); if (r && r.error) { toast(r.error,'er'); } else { cb(r); } })
    .withFailureHandler(e => { showSpin(false); toast(e.message||'Erro na requisição','er'); })
    .handleRequest(action, data || {});
}

function showSpin(v) { $('spinOv').classList.toggle('on', v); }

function toast(msg, type='ok') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<i class="fa-solid ${type==='ok'?'fa-circle-check':'fa-circle-xmark'}"></i>${esc(msg)}`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

function openModal(id) { $(id).classList.add('on'); }
function closeModal(id) { $(id).classList.remove('on'); }

function toggleSb() {
  $('sidebar').classList.toggle('open');
  $('sbOv').classList.toggle('on');
}
function closeSb() {
  $('sidebar').classList.remove('open');
  $('sbOv').classList.remove('on');
}

function go(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  $(`page-${page}`).classList.add('active');
  $(`nav-${page}`).classList.add('active');
  const titles = { 
    dashboard:'Dashboard', efetivo:'Efetivo', escalas:'Escalas', plantoes:'Plantões', 
    afastamentos:'Afastamentos', ferias:'Férias', faltas:'Faltas', 
    bancohoras:'Banco de Horas', estatisticas:'Estatísticas', usuarios:'Gestão de Usuários' 
  };
  $('tb-title').textContent = titles[page] || page;
  S.currentPage = page;
  closeSb();
  setupPageActions(page);
  if (page === 'dashboard') { loadDashboard(); renderForcaDisponivel(); }
  else if (page === 'efetivo') renderEfetivo();
  else if (page === 'usuarios') renderUsuarios();
  else if (page === 'escalas') renderCalendar();
  else if (page === 'plantoes') renderPCalendar();
  else if (page === 'afastamentos') renderAfastamentos();
  else if (page === 'ferias') renderFerias();
  else if (page === 'faltas') renderFaltas();
  else if (page === 'bancohoras') renderBHAll();
  else if (page === 'estatisticas') renderEstatisticas('HOJE');
}

function setupPageActions(page) {
  const map = {
    efetivo: `<button class="btn btn-p" onclick="openEfetivo()"><i class="fa-solid fa-plus"></i> Novo Servidor</button>`,
    afastamentos: `<button class="btn btn-p" onclick="openAfastamento()"><i class="fa-solid fa-plus"></i> Registrar</button>`,
    ferias: `<button class="btn btn-p" onclick="openFerias()"><i class="fa-solid fa-plus"></i> Agendar</button>`,
    faltas: `<button class="btn btn-p" onclick="openFalta()"><i class="fa-solid fa-plus"></i> Registrar</button>`,
    bancohoras: `<button class="btn btn-p" onclick="openBH()"><i class="fa-solid fa-plus"></i> Lançar Horas</button>`,
  };
  $('tb-actions').innerHTML = map[page] || '';
}

// ── Nomes / Avatares ─────────────────────────────────
function nomeById(id, full = false) {
  const e = S.efetivo.find(x => String(x.id) === String(id));
  if (!e) return `#${id}`;
  if (full) return e.nome;
  return e.nome_de_guerra || e.nome;
}
function initials(nome) {
  return (nome||'?').split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
}
function avColor(id) {
  return 'av' + (Math.abs(Number(id)) % 6);
}
function av(id, nome) {
  return `<div class="av ${avColor(id)}">${esc(initials(nome||nomeById(id)))}</div>`;
}

// ── Data formatação ───────────────────────────────────
const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DIASEM = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
function fmtDate(s) {
  if (!s) return '-';
  const [y,m,d] = String(s).split('-');
  return `${d}/${m}/${y}`;
}
function todayStr() {
  return new Date().toLocaleDateString('sv-SE');
}
function isAfastado(eId, dateStr) {
  return S.afastamentos.some(a =>
    String(a.efetivo_id) === String(eId) && a.status === 'ATIVO' &&
    a.data_inicio <= dateStr && a.data_fim >= dateStr
  );
}
function isFeriasOn(eId, dateStr) {
  return S.ferias.some(f =>
    String(f.efetivo_id) === String(eId) && f.data_inicio <= dateStr && f.data_fim >= dateStr
  );
}

// ── CLOCK ────────────────────────────────────────────
function tickClock() {
  const now = new Date();
  $('cDay').textContent = now.getDate();
  $('cDate').textContent = `${DIASEM[now.getDay()]}, ${MESES[now.getMonth()].substring(0,3)} ${now.getFullYear()}`;
  $('cTime').textContent = now.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
}

// ── LOAD DATA ────────────────────────────────────────
function loadAll(cb) {
  let done = 0;
  const check = () => { if (++done === 6 && cb) cb(); };
  api('getEfetivo',  {}, r => { S.efetivo      = r||[]; check(); });
  api('getEscalas',  {}, r => { S.escalas      = r||[]; check(); });
  api('getPlantoes', {}, r => { S.plantoes     = r||[]; check(); });
  api('getAfastamentos', {}, r => { S.afastamentos = r||[]; check(); });
  api('getFerias',   {}, r => { S.ferias       = r||[]; check(); });
  api('getFaltas',   {}, r => { S.faltas       = r||[]; check(); });
}
function loadBH(cb) {
  api('getBancoHoras', {}, r => { S.bancoHoras = r||[]; if(cb)cb(); });
}

// ── DASHBOARD ────────────────────────────────────────
// ── DASHBOARD ────────────────────────────────────────
function loadDashboard() {
  api('getDashboard', {}, d => {
    const ativos = d.afastAtivos || 0;
    if (ativos > 0) { $('badge-af').textContent = ativos; $('badge-af').style.display=''; }
    else { $('badge-af').style.display='none'; }

    const pend = d.usuariosPendentes || 0;
    if (pend > 0) { 
      $('badge-u-pend').textContent = pend; $('badge-u-pend').style.display=''; 
      if ($('dash-alert')) $('dash-alert').style.display='block';
    } else { 
      $('badge-u-pend').style.display='none'; 
      if ($('dash-alert')) $('dash-alert').style.display='none';
    }

    $('dash-stats').innerHTML = `
      <div class="stat"><div class="s-ico bl"><i class="fa-solid fa-users"></i></div><div class="s-info"><h3>${d.totalEfetivo||0}</h3><p>Total Efetivo</p></div></div>
      <div class="stat"><div class="s-ico pu"><i class="fa-solid fa-calendar-check"></i></div><div class="s-info"><h3>${(d.escalaHoje||[]).length}</h3><p>Em Serviço Hoje</p></div></div>
      <div class="stat"><div class="s-ico rd"><i class="fa-solid fa-briefcase-medical"></i></div><div class="s-info"><h3>${d.afastAtivos||0}</h3><p>Afastados</p></div></div>
      <div class="stat"><div class="s-ico am"><i class="fa-solid fa-umbrella-beach"></i></div><div class="s-info"><h3>${d.feriasProx||0}</h3><p>Férias Próximas</p></div></div>
      <div class="stat"><div class="s-ico te"><i class="fa-solid fa-star"></i></div><div class="s-info"><h3>${(d.plantoesHoje||[]).length}</h3><p>Plantões Hoje</p></div></div>
      <div class="stat"><div class="s-ico gr"><i class="fa-solid fa-xmark"></i></div><div class="s-info"><h3>${d.totalFaltasMes||0}</h3><p>Faltas no Mês</p></div></div>`;

    // Render Rankings
    renderRank('dash-rank-prod', d.rankingProdutividade, 'Escalas');
    renderRank('dash-rank-assid', d.rankingAssiduidade, 'Afastamentos');

    // Escala hoje (agrupada por Turno -> Equipe)
    const esc = d.escalaHoje || [];
    const grupos = {};
    esc.forEach(e => { 
      const t = e.turno;
      const eq = e.equipe || 'SEM EQUIPE';
      if (!grupos[t]) grupos[t] = {};
      if (!grupos[t][eq]) grupos[t][eq] = [];
      grupos[t][eq].push(e);
    });

    if (Object.keys(grupos).length === 0) {
      $('dash-today').innerHTML = `<div class="empty"><i class="fa-solid fa-calendar-xmark"></i><h3>Nenhuma escala hoje</h3><p>Acesse "Escalas" para montar a escala do dia.</p></div>`;
    } else {
      let html = '<div class="today-grid">';
      for (const [turno, equipes] of Object.entries(grupos)) {
        html += `<div class="tg-card"><div class="tg-hdr">${turnoIcon(turno)} ${turno}</div>`;
        for (const [equipe, items] of Object.entries(equipes)) {
          html += `<div class="team-sec">
            <div class="team-hdr"><i class="fa-solid fa-motorcycle"></i> ${esc(equipe)}</div>
            ${items.map(i => `<div class="p-row">${av(i.efetivo_id, i.nome)}<span style="flex:1">${esc(i.nome)}</span><span class="badge ${funcaoColor(i.funcao)}">${esc(i.funcao)}</span></div>`).join('')}
          </div>`;
        }
        html += `</div>`;
      }
      html += '</div>';
      $('dash-today').innerHTML = html;
    }

    // Afastamentos ativos
    const afs = d.afastamentos || [];
    $('dash-af').innerHTML = afs.length ? afs.slice(0,5).map(a=>
      `<div class="p-row">${av(a.efetivo_id, nomeById(a.efetivo_id))}<div style="flex:1"><div style="font-size:12px;font-weight:600">${esc(nomeById(a.efetivo_id))}</div><div style="font-size:11px;color:var(--t2)">${fmtDate(a.data_inicio)} → ${fmtDate(a.data_fim)}</div></div><span class="badge badge-rd">${esc(tipoAfLabel(a.tipo))}</span></div>`
    ).join('') : `<div class="empty" style="padding:24px"><i class="fa-solid fa-circle-check"></i><p>Nenhum afastamento ativo</p></div>`;

    // Férias próximas
    const fers = d.ferias || [];
    $('dash-fer').innerHTML = fers.length ? fers.slice(0,5).map(f=>
      `<div class="p-row">${av(f.efetivo_id, nomeById(f.efetivo_id))}<div style="flex:1"><div style="font-size:12px;font-weight:600">${esc(nomeById(f.efetivo_id))}</div><div style="font-size:11px;color:var(--t2)">${fmtDate(f.data_inicio)} → ${fmtDate(f.data_fim)}</div></div><span class="badge badge-gr">${f.dias_gozados}d</span></div>`
    ).join('') : `<div class="empty" style="padding:24px"><i class="fa-solid fa-sun"></i><p>Nenhuma férias agendada</p></div>`;
  });
}

function renderRank(id, list, unit) {
  if (!list || !list.length) {
    $(id).innerHTML = `<div style="padding:20px; text-align:center; opacity:0.5; font-size:13px">Sem dados suficientes</div>`;
    return;
  }
  $(id).innerHTML = list.map((r, i) => `
    <div class="rank-item">
      <div class="ri-num">${i+1}º</div>
      <div class="ri-nome"><strong>${esc(r.nome)}</strong><br><small>${esc(r.matricula)}</small></div>
      <div class="ri-val">${r.total} <small>${unit}</small></div>
    </div>
  `).join('');
}

// ── FORÇA DISPONÍVEL ─────────────────────────────────
function renderForcaDisponivel() {
  const hj = todayStr();
  const efAtivos = S.efetivo.filter(e => e.ativo === true || e.ativo === 'true' || e.ativo === 'TRUE');

  const impedidosIds = new Set();
  S.afastamentos.forEach(a => {
    if (a.status === 'ATIVO' && a.data_inicio <= hj && a.data_fim >= hj)
      impedidosIds.add(String(a.efetivo_id));
  });
  S.ferias.forEach(f => {
    if (f.data_inicio <= hj && f.data_fim >= hj)
      impedidosIds.add(String(f.efetivo_id));
  });

  const escaladosHoje = new Set(S.escalas.filter(e => e.data === hj).map(e => String(e.efetivo_id)));

  const grupos = [
    {
      key:'srv', ico:'fa-shield', cls:'srv',
      label:'Serviço 24x72', sub:'Escala de 24 horas',
      membros: efAtivos.filter(e => e.tipo_escala === '24x72')
    },
    {
      key:'mnh', ico:'fa-sun', cls:'mnh',
      label:'Turno Manhã', sub:'Escala 2x2 – Manhã',
      membros: efAtivos.filter(e => e.tipo_escala === '2x2' &&
        ((e.grupo_turno||'').toUpperCase().includes('MANHA') || (e.grupo_turno||'').toUpperCase().includes('A II')))
    },
    {
      key:'trd', ico:'fa-moon', cls:'trd',
      label:'Turno Tarde', sub:'Escala 2x2 – Tarde',
      membros: efAtivos.filter(e => e.tipo_escala === '2x2' &&
        !((e.grupo_turno||'').toUpperCase().includes('MANHA') || (e.grupo_turno||'').toUpperCase().includes('A II')))
    }
  ];

  try {
    const dataFmt = new Date(hj + 'T12:00:00').toLocaleDateString('pt-BR', {weekday:'long', day:'2-digit', month:'long'});
    $('forca-data').textContent = dataFmt;
  } catch(e) {}

  $('dash-forca').innerHTML = `<div class="forca-grid">${grupos.map(g => {
    const total   = g.membros.length;
    const impMems = g.membros.filter(m => impedidosIds.has(String(m.id)));
    const dispNum = total - impMems.length;
    const escNum  = g.membros.filter(m => escaladosHoje.has(String(m.id))).length;
    const pct     = total > 0 ? Math.round((dispNum / total) * 100) : 0;
    const afNum   = g.membros.filter(m => S.afastamentos.some(a =>
      a.status==='ATIVO' && a.data_inicio<=hj && a.data_fim>=hj && String(a.efetivo_id)===String(m.id))).length;
    const ferNum  = g.membros.filter(m => S.ferias.some(f =>
      f.data_inicio<=hj && f.data_fim>=hj && String(f.efetivo_id)===String(m.id))).length;
    const tags = [
      afNum  > 0 ? `<span class="ftag ftag-af">🏥 ${afNum} Atestado${afNum>1?'s':''}</span>` : '',
      ferNum > 0 ? `<span class="ftag ftag-fer">🏖️ ${ferNum} Férias</span>` : '',
      escNum > 0 ? `<span class="ftag ftag-esc">✅ ${escNum} Escalado${escNum>1?'s':''}</span>` : ''
    ].filter(Boolean).join('') || `<span class="ftag" style="color:var(--t3)">Sem registros hoje</span>`;
    return `<div class="forca-card">
      <div class="forca-hdr">
        <div class="forca-ico ${g.cls}"><i class="fa-solid ${g.ico}"></i></div>
        <div><div class="forca-ttl">${g.label}</div><div class="forca-sub">${g.sub}</div></div>
      </div>
      <div class="forca-nums">
        <div class="forca-num"><div class="fn-val fn-total">${total}</div><div class="fn-lbl">Total</div></div>
        <div class="forca-num"><div class="fn-val fn-disp">${dispNum}</div><div class="fn-lbl">Disponível</div></div>
        <div class="forca-num"><div class="fn-val fn-imp">${impMems.length}</div><div class="fn-lbl">Impedido</div></div>
      </div>
      <div class="forca-bar-bg"><div class="forca-bar-fill ${g.cls}" style="width:${pct}%"></div></div>
      <div class="forca-tags">${tags}</div>
    </div>`;
  }).join('')}</div>`;
}

function turnoIcon(t) {
  if (t==='SERVIÇO') return '<i class="fa-solid fa-shield" style="color:var(--purple)"></i>';
  if (t==='MANHÃ') return '<i class="fa-solid fa-sun" style="color:var(--amber)"></i>';
  if (t==='TARDE') return '<i class="fa-solid fa-moon" style="color:var(--blue)"></i>';
  return '<i class="fa-solid fa-clock"></i>';
}
function turnoLabel(t) {
  if (t === 'SERVIÃ‡O') return 'SERVIÃ‡O 24H (06H Ã€S 06H)';
  if (t === 'MANHÃƒ') return 'MANHÃƒ 2X2 (06H Ã€S 14H)';
  if (t === 'TARDE') return 'TARDE 2X2 (15H Ã€S 23H)';
  return t;
}
function turnoOrder(t) {
  if (t === 'SERVIÃ‡O') return 0;
  if (t === 'MANHÃƒ') return 1;
  if (t === 'TARDE') return 2;
  return 99;
}
function sortEscalaEntries(list) {
  return [...list].sort((a, b) => {
    const efA = S.efetivo.find(x => String(x.id) === String(a.efetivo_id));
    const efB = S.efetivo.find(x => String(x.id) === String(b.efetivo_id));
    return (Number(efA && efA.antiguidade) || 999) - (Number(efB && efB.antiguidade) || 999);
  });
}
function turnoLabelSafe(t) {
  const turno = String(t || '').toUpperCase();
  if (turno.includes('SERV')) return 'SERVICO 24H (06H AS 06H)';
  if (turno.includes('MANH')) return 'MANHA 2X2 (06H AS 14H)';
  if (turno.includes('TARDE')) return 'TARDE 2X2 (15H AS 23H)';
  return t;
}
function turnoOrderSafe(t) {
  const turno = String(t || '').toUpperCase();
  if (turno.includes('SERV')) return 0;
  if (turno.includes('MANH')) return 1;
  if (turno.includes('TARDE')) return 2;
  return 99;
}
function funcaoColor(f) {
  if (f==='Supervisor') return 'badge-am';
  if (f==='Armeiro') return 'badge-te';
  if (f==='04 - Garupa') return 'badge-04';
  if (f==='01 - Batedor') return 'badge-pu';
  if (f==='02 - Ala') return 'badge-bl';
  if (f==='03 - Escolta') return 'badge-gr';
  return 'badge-gy';
}
function tipoAfLabel(t) {
  const m={LICENÇA_MEDICA:'Lic. Médica', LICENÇA_ESPECIAL:'Lic. Especial', OUTROS:'Outros'};
  return m[t]||t;
}

// ── EFETIVO ──────────────────────────────────────────
function renderEfetivo() {
  const q   = ($('ef-srch')||{value:''}).value.toLowerCase();
  const ft  = ($('ef-filter-tipo')||{value:''}).value;
  const fs  = ($('ef-filter-status')||{value:'true'}).value;
  let rows  = S.efetivo;
  if (q)  rows = rows.filter(e => e.nome.toLowerCase().includes(q) || String(e.matricula).includes(q));
  if (ft) rows = rows.filter(e => e.tipo_escala === ft);
  if (fs !== '') rows = rows.filter(e => String(e.ativo) === (fs==='true'?'true':'false') || e.ativo === (fs==='true'));

  const sorted = [...rows].sort((a,b)=>(a.antiguidade||999)-(b.antiguidade||999));
  $('ef-tbody').innerHTML = sorted.length ? sorted.map(e => {
    const ativo = e.ativo === true || e.ativo === 'true' || e.ativo === 'TRUE';
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:8px">${av(e.id, e.nome)}<span style="font-weight:500">${esc(e.nome)}</span></div></td>
      <td><span style="font-weight:700;color:var(--primary)">${esc(e.nome_de_guerra || '-')}</span></td>
      <td>${esc(e.matricula)}</td>
      <td>${esc(e.posto_graduacao)}</td>
      <td><span class="badge ${e.tipo_escala==='24x72'?'badge-pu':'badge-te'}">${esc(e.tipo_escala)}</span></td>
      <td>${e.tipo_escala==='2x2'?`<span class="badge ${e.grupo_turno==='MANHA'?'badge-am':'badge-bl'}">${e.grupo_turno==='MANHA'?'Manhã':'Tarde'}</span>`:'-'}</td>
      <td style="text-align:center;font-weight:600">${e.antiguidade||'-'}</td>
      <td><span class="badge ${ativo?'badge-gr':'badge-rd'}">${ativo?'Ativo':'Inativo'}</span></td>
      <td style="white-space:nowrap">
        <button class="btn btn-sm btn-s" onclick="editEfetivo(${e.id})" title="Editar"><i class="fa-solid fa-pen"></i></button>
        <button class="btn btn-sm ${ativo?'btn-d':'btn-g'}" onclick="toggleEf(${e.id})" style="margin-left:4px">${ativo?'Inativar':'Ativar'}</button>
      </td></tr>`;
  }).join('') : `<tr><td colspan="9"><div class="empty"><i class="fa-solid fa-users-slash"></i><h3>Nenhum resultado</h3></div></td></tr>`;
}

function openEfetivo() {
  $('ef-id').value=''; $('m-ef-title').textContent='Novo Servidor';
  ['ef-nome','ef-guerra','ef-mat','ef-posto','ef-obs'].forEach(f=>$(f).value='');
  $('ef-ant').value=''; $('ef-tipo').value='24x72'; $('ef-grupo').value='MANHA';
  $('ef-adm').value=todayStr(); toggleGrupo(); openModal('m-efetivo');
}
function editEfetivo(id) {
  const e = S.efetivo.find(x=>String(x.id)===String(id)); if(!e)return;
  $('ef-id').value=e.id; $('m-ef-title').textContent='Editar Servidor';
  $('ef-nome').value=e.nome; $('ef-guerra').value=e.nome_de_guerra||'';
  $('ef-mat').value=e.matricula;
  $('ef-posto').value=e.posto_graduacao; $('ef-ant').value=e.antiguidade;
  $('ef-tipo').value=e.tipo_escala; $('ef-grupo').value=e.grupo_turno||'MANHA';
  $('ef-adm').value=e.data_admissao||''; $('ef-obs').value=e.observacoes||'';
  toggleGrupo(); openModal('m-efetivo');
}
function toggleGrupo() {
  $('ef-grupo-wrap').style.display = $('ef-tipo').value==='2x2' ? 'block':'none';
}
function saveEfetivo() {
  const d = {
    nome:$('ef-nome').value.trim(), 
    nome_de_guerra:$('ef-guerra').value.trim(),
    matricula:$('ef-mat').value.trim(),
    posto_graduacao:$('ef-posto').value.trim(), antiguidade:$('ef-ant').value,

// ── ESCALA CALENDÁRIO ────────────────────────────────
const WDAYS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
function renderCalendar() {
  const m = S.calMes, y = S.calAno;
  $('cal-title').textContent = `${MESES[m-1]} ${y}`;
  $('cal-head').innerHTML = WDAYS.map(d=>`<div class="cal-dh">${d}</div>`).join('');
  const first = new Date(y,m-1,1).getDay();
  const days  = new Date(y,m,0).getDate();
  const prev  = new Date(y,m-1,0).getDate();
  const hj    = todayStr();
  let cells = '';
  for(let i=0;i<first;i++){
    cells+=`<div class="cal-day other"><div class="cal-n">${prev-first+i+1}</div></div>`;
  }
  for (let d=1;d<=days;d++) {
    const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayEscalas = S.escalas.filter(e=>e.data===dateStr);
    const dayPlatoes = S.plantoes.filter(p=>p.data===dateStr);
    const dayAf = S.afastamentos.filter(a=>a.status==='ATIVO'&&a.data_inicio<=dateStr&&a.data_fim>=dateStr);
    const dayFer= S.ferias.filter(f=>f.data_inicio<=dateStr&&f.data_fim>=dateStr);
    const isToday = dateStr===hj;
    const isSel   = S.selDay===dateStr;
    const hasEv   = dayEscalas.length||dayPlatoes.length||dayAf.length||dayFer.length;
    let evHTML = '';
    dayEscalas.slice(0,2).forEach(e=>{ evHTML+=`<div class="cal-ev ${e.turno==='SERVIÇO'?'ev-srv':e.turno==='MANHÃ'?'ev-mnh':'ev-trd'}">${esc(nomeById(e.efetivo_id).split(' ')[0])}</div>`; });
    dayAf.slice(0,1).forEach(a=>{ evHTML+=`<div class="cal-ev ev-afs">Afast.</div>`; });
    dayFer.slice(0,1).forEach(f=>{ evHTML+=`<div class="cal-ev ev-fer">Férias</div>`; });
    cells+=`<div class="cal-day${isToday?' today':''}${isSel?' selected':''}${hasEv?' has-ev':''}" onclick="selectDay('${dateStr}')">
      <div class="cal-n">${d}</div>${evHTML}</div>`;
  }
  let total = first+days; const rem=(7-total%7)%7;
  for(let i=1;i<=rem;i++) cells+=`<div class="cal-day other"><div class="cal-n">${i}</div></div>`;
  $('cal-body').innerHTML=cells;

  if(S.selDay) renderDayPanel(S.selDay);
}
function calNav(dir) {
  if(dir===0){S.calMes=new Date().getMonth()+1;S.calAno=new Date().getFullYear();}
  else {S.calMes+=dir; if(S.calMes>12){S.calMes=1;S.calAno++;} if(S.calMes<1){S.calMes=12;S.calAno--;}}
  renderCalendar();
}
function selectDay(dateStr) {
  S.selDay=dateStr; renderCalendar(); renderDayPanel(dateStr);
}
function renderDayPanel(dateStr) {
  const [y,m,d]=dateStr.split('-');
  $('dp-title').innerHTML=`<i class="fa-solid fa-calendar-day"></i> ${d}/${m}/${y}`;
  $('day-panel').style.display='block';
  const items = S.escalas.filter(e => e.data === dateStr);
  const grupos = {};
  items.forEach(e => {
    const t = e.turno;
    const eq = e.equipe || 'Gerencial/Apoio';
    if (!grupos[t]) grupos[t] = {};
    if (!grupos[t][eq]) grupos[t][eq] = [];
    grupos[t][eq].push(e);
  });

  if (!Object.keys(grupos).length) {
    $('dp-body').innerHTML = `<div class="empty" style="padding:24px"><i class="fa-solid fa-calendar-plus"></i><p>Nenhuma escala registrada.</p></div>`;
    return;
  }

  let html = '';
  for (const [turno, equipes] of Object.entries(grupos).sort((a, b) => turnoOrderSafe(a[0]) - turnoOrderSafe(b[0]))) {
    html += `<div class="turno-sec"><div class="turno-ttl">${turnoIcon(turno)} ${turnoLabelSafe(turno)}</div>`;
    for (const [equipe, members] of Object.entries(equipes)) {
      const sortedMembers = sortEscalaEntries(members);
      html += `<div class="team-sec" style="margin:10px 0; border-left-color:var(--t3)">
        <div class="team-hdr" style="font-size:11px; padding:4px 0"><i class="fa-solid fa-motorcycle" style="font-size:12px"></i> ${esc(equipe)}</div>
        <div style="display:flex; flex-wrap:wrap; gap:8px">
          ${sortedMembers.map(i => `
            <span class="chip" onclick="delEscala(${i.id},this)" title="Remover">
              ${av(i.efetivo_id, nomeById(i.efetivo_id))}
              ${esc(nomeById(i.efetivo_id))}
              <span class="badge ${funcaoColor(i.funcao)}" style="font-size:9px">${esc(i.funcao)}</span>
              <i class="fa-solid fa-xmark" style="color:var(--t3);font-size:10px"></i>
            </span>`).join('')}
        </div>
      </div>`;
    }
    html += `</div>`;
  }
  $('dp-body').innerHTML = html;
}

function shareWhatsApp() {
  if (!S.selDay) return;
  const items = S.escalas.filter(e => e.data === S.selDay);

  const [y, m, d] = S.selDay.split('-');

  const grupos = {};
  items.forEach(e => {
    const t = e.turno;

    if (!grupos[t]) grupos[t] = {};
    if (!grupos[t][eq]) grupos[t][eq] = [];
    grupos[t][eq].push(e);
  });

  for (const [turno, equipes] of Object.entries(grupos).sort((a, b) => turnoOrderSafe(a[0]) - turnoOrderSafe(b[0]))) {

function calcSaldo(eId){
  const regs=S.bancoHoras.filter(r=>String(r.efetivo_id)===String(eId));
  const c=regs.filter(r=>r.tipo==='CREDITO').reduce((s,r)=>s+(parseFloat(r.horas)||0),0);
  const d=regs.filter(r=>r.tipo==='DEBITO').reduce((s,r)=>s+(parseFloat(r.horas)||0),0);
  return Math.round((c-d)*10)/10;
}

// ── ESTATÍSTICAS ──────────────────────────────────────
let curStatsFilter = 'HOJE';

function setStatsFilter(tipo, el) {
  curStatsFilter = tipo;
  document.querySelectorAll('.s-filter').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderEstatisticas(tipo);
}

function getRange(tipo) {
  const hj = new Date();
  hj.setHours(0,0,0,0);
  let ini, fim = new Date(hj);
  fim.setHours(23,59,59,999);

  if (tipo === 'HOJE') {
    ini = new Date(hj);
  } else if (tipo === 'SMN') {
    const day = hj.getDay() || 7; // Ajuste para segunda ser 1
    ini = new Date(hj);
    ini.setDate(hj.getDate() - (day - 1));
  } else if (tipo === 'QZN') {
    ini = new Date(hj);
    if (hj.getDate() <= 15) {
      ini.setDate(1);
      fim.setDate(15);
    } else {
      ini.setDate(16);
      fim = new Date(hj.getFullYear(), hj.getMonth() + 1, 0); // Último dia
    }
  } else if (tipo === 'MES') {
    ini = new Date(hj.getFullYear(), hj.getMonth(), 1);
    fim = new Date(hj.getFullYear(), hj.getMonth() + 1, 0);
  } else if (tipo === 'ANO') {
    ini = new Date(hj.getFullYear(), 0, 1);
    fim = new Date(hj.getFullYear(), 11, 31);
  } else {
    ini = new Date(2000, 0, 1);
    fim = new Date(2100, 11, 31);
  }

  const toStr = d => d.toISOString().split('T')[0];
  return { ini: toStr(ini), fim: toStr(fim) };
}

function renderEstatisticas(tipo) {
  const range = getRange(tipo);
  
  // 1. Ranking 04
  const counts04 = {};
  S.escalas.forEach(e => {
    if (e.funcao === '04 - Garupa' && e.data >= range.ini && e.data <= range.fim) {
      counts04[e.efetivo_id] = (counts04[e.efetivo_id] || 0) + 1;
    }
  });
  renderRankList('rank-04', counts04, 'Plantão(ões)');

  // 2. Ranking Atestados
  const countsAt = {};
  S.afastamentos.forEach(a => {
    if (a.tipo === 'LICENÇA_MEDICA') {
      // Cálculo de intersecção de datas
      const aIni = a.data_inicio;
      const aFim = a.data_fim || a.data_inicio;
      
      const start = aIni > range.ini ? aIni : range.ini;
      const end = aFim < range.fim ? aFim : range.fim;
      
      if (start <= end) {
        const diff = Math.ceil((new Date(end + 'T00:00:00') - new Date(start + 'T00:00:00')) / 86400000) + 1;
        countsAt[a.efetivo_id] = (countsAt[a.efetivo_id] || 0) + diff;
      }
    }
  });
  renderRankList('rank-atestados', countsAt, 'Dia(s)');
}

function renderRankList(targetId, dataObj, suffix) {
  const sorted = Object.entries(dataObj)
    .sort((a,b) => b[1] - a[1])
    .slice(0, 10); // Top 10

  const max = sorted.length ? sorted[0][1] : 1;
  
  $(targetId).innerHTML = sorted.length ? sorted.map(([id, val], idx) => {
    const nome = nomeById(id);
    const pct = (val / max) * 100;
    return `
      <div class="rank-item">
        <div class="rank-pos">${idx + 1}</div>
        ${av(id, nome)}
        <div class="rank-main">
          <div class="rank-name">${esc(nome)} <span class="rank-val">${val} ${suffix}</span></div>
          <div class="rank-bar-bg"><div class="rank-bar-fill" style="width: ${pct}%"></div></div>
        </div>
      </div>`;
  }).join('') : `<div class="empty" style="padding:20px"><i class="fa-solid fa-chart-simple"></i><p>Sem dados neste período</p></div>`;
  
  // Trigger bar animation
  setTimeout(() => {
    document.querySelectorAll(`#${targetId} .rank-bar-fill`).forEach(b => {
      const w = b.style.width;
      b.style.width = '0';
      setTimeout(() => b.style.width = w, 50);
    });
  }, 100);
}
function maskCPF(i) {
  let v = i.value.replace(/\D/g, '');
  if (v.length > 11) v = v.substring(0, 11);
  if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
  else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, "$1.$2.$3");
  else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, "$1.$2");
  i.value = v;
}

}
function voltarLogin() {
  $('registerScreen').style.display='none';

}

function solicitarCadastro() {
  const d = {
    nome: $('reg-nome').value.trim(),
    cpf: $('reg-cpf').value.trim(),
    email: $('reg-email').value.trim(),
    graduacao: $('reg-grad').value,
    senha: $('reg-senha').value.trim()
  };
  const err = $('reg-err');
  
  if(!d.nome || d.cpf.length < 14 || !d.email || !d.graduacao || !d.senha) {
    err.textContent = 'Preencha todos os campos corretamente!'; err.style.display = 'block'; return;
  }
  if (!d.email.includes('@')) {
    err.textContent = 'E-mail parece inválido!'; err.style.display = 'block'; return;
  }
  
  err.style.display='none';
  api('enviarCodigoCadastro', d, r => {
    if(r && r.error) {
      err.textContent = r.error; err.style.display = 'block';
    } else {
      $('lbl-email').textContent = d.email;
      $('registerScreen').style.display = 'none';
      $('verifyScreen').style.display = 'flex';
      $('reg-codigo').value = '';
    }
  });
}

function confirmarCadastro() {
  const email = $('reg-email').value.trim();
  const codigo = $('reg-codigo').value.trim();
  const err = $('ver-err');
  
  if(codigo.length < 6) { err.textContent = 'Digite todos os 6 números do PIN.'; err.style.display='block'; return;}
  
  err.style.display='none';
    api('validarCadastro', {email, codigo}, r => {
      if(r && r.error) {
        err.textContent = r.error; err.style.display='block';
      } else {

        ok.innerHTML = `<i class="fa-solid fa-circle-check"></i> <b>E-mail Validado!</b><br>Seu cadastro foi recebido com sucesso. Agora aguarde a autorização do administrador para acessar o sistema.`;

        err.style.display='none';
        document.querySelector('#verifyScreen button').style.display='none';

  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value.trim();
  const err = document.getElementById('login-err');
  if (!u || !p) {

  err.style.display = 'none';

    let rows = r || [];
    if (q) rows = rows.filter(u => u.nome.toLowerCase().includes(q) || u.usuario.toLowerCase().includes(q) || u.email.toLowerCase().includes(q));
    if (fs) rows = rows.filter(u => u.status === fs);
    
    $('u-tbody').innerHTML = rows.length ? rows.map(u => `
      <tr>
        <td><span style="font-weight:600">${esc(u.usuario)}</span></td>
        <td>${esc(u.nome)}</td>
        <td><small>${esc(u.email || '-')}</small></td>
        <td><span class="badge ${u.nivel==='admin'?'badge-pu':'badge-bl'}">${esc(u.nivel)}</span></td>
        <td><span class="badge st-${String(u.status).toLowerCase()}">${esc(u.status)}</span></td>

          ${u.status === 'PENDENTE' ? `
            <button class="btn btn-sm btn-g" onclick="altStatusUsuario(${u.id}, 'ATIVO')" title="Autorizar">
              <i class="fa-solid fa-check"></i> Autorizar
            </button>
          ` : ''}
          ${u.status === 'ATIVO' && u.usuario !== 'admin' ? `
            <button class="btn btn-sm btn-d" onclick="altStatusUsuario(${u.id}, 'BLOQUEADO')" title="Bloquear">
              <i class="fa-solid fa-ban"></i>
            </button>
          ` : ''}
          ${u.status === 'BLOQUEADO' ? `
            <button class="btn btn-sm btn-g" onclick="altStatusUsuario(${u.id}, 'ATIVO')" title="Desbloquear">
              <i class="fa-solid fa-unlock"></i>
            </button>
          ` : ''}
        </td>
      </tr>
    `).join('') : `<tr><td colspan="6"><div class="empty" style="padding:40px"><i class="fa-solid fa-user-slash"></i><p>Nenhum usuário encontrado</p></div></td></tr>`;
  });
}

function altStatusUsuario(id, status) {
  const msg = status === 'ATIVO' ? 'Autorizar acesso para este usuário?' : 'Deseja alterar o status deste usuário?';
  if (!confirm(msg)) return;
  api('statusUsuario', { id, status }, r => {
    if (!r.error) {
      toast(status === 'ATIVO' ? 'Usuário autorizado!' : 'Status atualizado!');
      renderUsuarios();
      loadDashboard();
    }
  });
}

// ── NOVO FLUXO DE AUTENTICAÇÃO (GOOGLE) ───────────────────
function checkAuth() {
  $('loginScreen').style.display = 'flex';
  $('auth-msg').textContent = 'Verificando sua identidade Google...';
  
  google.script.run
    .withSuccessHandler(user => {
      if (user.status === 'ATIVO') {
        $('loginScreen').style.display = 'none';
        $('appMain').style.display = 'flex';
        // Configura visibilidade admin
        if (user.nivel === 'admin' || user.nivel === 'gestor') {
          $('nav-admin-sec').style.display = 'block';
        }
        initApp();
      } else if (user.status === 'PENDENTE') {
        $('auth-title').textContent = 'Acesso Restrito';
        $('auth-msg').style.display = 'none';
        $('auth-pending-msg').style.display = 'block';
      } else {
        // NOT_REGISTERED ou outros
        $('auth-title').textContent = 'Solicitar Acesso';
        $('auth-msg').textContent = `Olá! O e-mail ${user.email} ainda não está autorizado no sistema.`;
        $('auth-request-form').style.display = 'block';
      }
    })
    .withFailureHandler(err => {
      $('auth-msg').textContent = 'Erro ao verificar identidade.';
      $('auth-error-msg').textContent = err.message;
      $('auth-error-msg').style.display = 'block';
    })
    .handleRequest('checkAuth');
}

function solicitarAcesso() {
  const nome = $('req-nome').value;
  const mat = $('req-mat').value;
  
  if (!nome || !mat) {
    toast('Preencha nome e matrícula!', 'er');
    return;

  api('requestAccess', { nome, matricula: mat }, r => {
    if (r.success) {
      $('auth-request-form').style.display = 'none';
      $('auth-pending-msg').style.display = 'block';
      $('auth-msg').style.display = 'none';
      toast('Solicitação enviada!');
    }
  });
}

function sairSistema() {
  if (confirm('Deseja sair do sistema?')) {
    window.top.location.href = 'https://accounts.google.com/Logout';
  }
}
